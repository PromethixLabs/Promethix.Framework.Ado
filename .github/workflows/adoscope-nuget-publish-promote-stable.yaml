name: adoscope-nuget-publish-promote-stable
on:
  workflow_dispatch:
    inputs:
      package_version:
        description: 'NuGet package version to approve'
        required: true
        default: '1.0.0-commithash-alpha'
      new_package_version:
        description: 'Promotion version'
        required: true
        default: '1.0.0'

permissions:
  actions: read
  contents: write
  packages: write
  attestations: write
  id-token: write

env:
  NuGetDirectory: ${{ github.workspace }}/nuget
  NuGetDirectoryWin: ${{ github.workspace }}\nuget
  HashDirectory: ${{ github.workspace }}/hash
  SbomDirectory: ${{ github.workspace }}/sbom
  MetadataDirectory: ${{ github.workspace }}/metadata

jobs:
  extract-commit-hash:
    name: Extract Commit Hash
    runs-on: ubuntu-latest
    outputs:
      commit_hash: ${{ steps.set_commit_hash.outputs.commit_hash }}
    steps:
      - name: Extract Commit Hash
        id: set_commit_hash
        env:
          PACKAGE_VERSION: ${{ github.event.inputs.package_version }}
        run: |
          $pattern = '-alpha\.([0-9a-f]{7,40})$'
          if ($env:PACKAGE_VERSION -match $pattern) {
            $commitHash = $Matches[1]
            echo "commit_hash=$commitHash" >> $GITHUB_ENV
            echo "commit_hash=$commitHash" >> $GITHUB_OUTPUT
          } else {
            Write-Error "Commit hash not found in package version."
            exit 1
          }
        shell: pwsh

  build-package:
    name: Build
    uses: ./.github/workflows/adoscope-reusable-build.yaml
    needs: extract-commit-hash
    with:
      buildVersion: ${{ github.event.inputs.new_package_version }}
      releaseTag: ${{ github.event.inputs.new_package_version }}
      dotnetVersion: '10.0.x'
      commitHash: ${{ needs.extract-commit-hash.outputs.commit_hash }}
    secrets:
      repoToken: ${{ secrets.REPO_ACCESS_TOKEN }}

  tag-commit:
    name: Tag Commit
    needs: build-package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # This is crucial to fetch all history for tagging
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
      - name: Tag Commit Hash
        env:
          NEW_PACKAGE_VERSION: ${{ github.event.inputs.new_package_version }}
          MY_PAT: ${{ secrets.REPO_ACCESS_TOKEN }}
          COMMIT_HASH: ${{ needs.extract-commit-hash.outputs.commit_hash }}
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          # Checkout the commit
          git checkout $env:COMMIT_HASH
          # Tag the commit
          git tag $env:NEW_PACKAGE_VERSION
          # Push the tag: 
          git push origin refs/tags/$env:NEW_PACKAGE_VERSION
          # Push the tag using the PAT and correct repository URL
          $repoUrl = "${{ github.server_url }}/${{ github.repository }}".TrimStart('https://')
          git push "https://github-actions:${env:MY_PAT}@$repoUrl" refs/tags/$env:NEW_PACKAGE_VERSION
        shell: pwsh

  publish:
    needs: tag-commit
    name: Publish Promethix.Framework.Ado
    runs-on: ubuntu-latest
    steps:
    - name: Download artifact
      id: download-artifact
      uses: actions/download-artifact@v8
      with:
        name: Promethix.Framework.Ado.NuGet.${{ github.event.inputs.new_package_version }}
        path: ${{ env.NuGetDirectory }}

    - name: Download checksum artifact
      uses: actions/download-artifact@v8
      with:
        name: Promethix.Framework.Ado.NuGet.${{ github.event.inputs.new_package_version }}.sha256
        path: ${{ env.HashDirectory }}

    - name: Download SBOM artifact
      uses: actions/download-artifact@v8
      with:
        name: Promethix.Framework.Ado.NuGet.${{ github.event.inputs.new_package_version }}.sbom
        path: ${{ env.SbomDirectory }}

    - name: Download metadata artifact
      uses: actions/download-artifact@v8
      with:
        name: Promethix.Framework.Ado.NuGet.${{ github.event.inputs.new_package_version }}.metadata
        path: ${{ env.MetadataDirectory }}

    - name: Publish Nuget Package Promethix.Framework.Ado
      working-directory: .
      run: |
        echo Directory List
        ls
        echo NuGet Directory List
        ls ${{ env.NuGetDirectory }}
        NEW_PACKAGE_VERSION=${{ github.event.inputs.new_package_version }}
        dotnet nuget push ${{ env.NuGetDirectory }}/Promethix.Framework.Ado.${NEW_PACKAGE_VERSION}.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}

    - name: Create or update GitHub release
      env:
        GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
        NEW_PACKAGE_VERSION: ${{ github.event.inputs.new_package_version }}
      run: |
        gh release view "$NEW_PACKAGE_VERSION" --repo "${{ github.repository }}" > /dev/null 2>&1 || \
        gh release create "$NEW_PACKAGE_VERSION" \
          --repo "${{ github.repository }}" \
          --title "$NEW_PACKAGE_VERSION" \
          --target "$NEW_PACKAGE_VERSION" \
          --latest \
          --notes "Release provenance assets for $NEW_PACKAGE_VERSION"

    - name: Upload release assets
      env:
        GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
        NEW_PACKAGE_VERSION: ${{ github.event.inputs.new_package_version }}
      run: |
        gh release upload "$NEW_PACKAGE_VERSION" \
          "${{ env.NuGetDirectory }}/Promethix.Framework.Ado.${NEW_PACKAGE_VERSION}.nupkg" \
          "${{ env.HashDirectory }}/Promethix.Framework.Ado.${NEW_PACKAGE_VERSION}.sha256" \
          "${{ env.SbomDirectory }}/Promethix.Framework.Ado.${NEW_PACKAGE_VERSION}.sbom.xml" \
          "${{ env.MetadataDirectory }}/release-metadata.${NEW_PACKAGE_VERSION}.json" \
          --repo "${{ github.repository }}" \
          --clobber

