name: adoscope-reusable-build

on:
  workflow_call:
    inputs:
      buildVersion:
        required: true
        type: string
      dotnetVersion:
        required: true
        type: string
      commitHash:
        required: false
        type: string
        description: 'Short SHA commit hash to checkout. If not provided, the latest commit will be used.'
    secrets:
      repoToken:
        required: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  NuGetDirectory: ${{ github.workspace }}/nuget
  NuGetDirectoryWin: ${{ github.workspace }}\nuget
  SbomDirectory: ${{ github.workspace }}/sbom
  SbomDirectoryWin: ${{ github.workspace }}\sbom

jobs:
  build:
    name: Build, Test and Package
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.commitHash || 'main' }}
        
      - name: Set BuildVersion
        run: |
          $buildVersion = '${{ inputs.buildVersion }}'
          echo "BuildVersion=$buildVersion" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnetVersion }}

      - name: Install CycloneDX SBOM Tool
        shell: pwsh
        run: dotnet tool install --global CycloneDX --version 5.*

      - name: Clear NuGet Cache
        run: dotnet nuget locals all --clear

      - name: Restore Dependencies
        working-directory: .
        run: dotnet restore --force-evaluate --no-cache

      - name: Build
        working-directory: .
        run: dotnet build --no-restore --configuration Release

      - name: Run Tests
        working-directory: ./Promethix.Framework.Ado.Tests
        run: dotnet test --no-restore --verbosity normal --filter TestCategory="IntegrationTestsOnCI|Unit"

      - name: Package
        working-directory: .
        run: dotnet pack --no-restore --configuration Release --output ${{ env.NuGetDirectoryWin }}

      - name: Generate Package Hashes
        working-directory: .
        shell: pwsh
        run: |
          $hashFile = Join-Path '${{ env.NuGetDirectoryWin }}' "Promethix.Framework.Ado.${{ inputs.buildVersion }}.sha256"
          if (Test-Path $hashFile) {
            Remove-Item -LiteralPath $hashFile -Force
          }

          Get-ChildItem -Path '${{ env.NuGetDirectoryWin }}' -Filter *.nupkg | ForEach-Object {
            $hash = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "{0} *{1}" -f $hash, $_.Name | Out-File -FilePath $hashFile -Encoding ascii -Append
          }

      - name: Generate SBOM
        working-directory: .
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path '${{ env.SbomDirectoryWin }}' | Out-Null
          & "$env:USERPROFILE\.dotnet\tools\dotnet-CycloneDX.exe" ".\Promethix.Framework.Ado.sln" `
            --output "${{ env.SbomDirectoryWin }}" `
            --filename "Promethix.Framework.Ado.${{ inputs.buildVersion }}.sbom.xml"

      - name: Upload Nuget Package Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Promethix.Framework.Ado.NuGet.${{ inputs.buildVersion }}
          if-no-files-found: error
          retention-days: 7
          path: ${{ env.NuGetDirectoryWin }}\*.nupkg

      - name: Upload Nuget Package Hashes
        uses: actions/upload-artifact@v6
        with:
          name: Promethix.Framework.Ado.NuGet.${{ inputs.buildVersion }}.sha256
          if-no-files-found: error
          retention-days: 7
          path: ${{ env.NuGetDirectoryWin }}\*.sha256

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Promethix.Framework.Ado.NuGet.${{ inputs.buildVersion }}.sbom
          if-no-files-found: error
          retention-days: 7
          path: ${{ env.SbomDirectoryWin }}\*.sbom.xml

      - name: Attest Nuget Package Provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ env.NuGetDirectory }}/*.nupkg

      - name: Attest Nuget Package Hashes
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ env.NuGetDirectory }}/*.sha256

      - name: Attest SBOM
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ env.SbomDirectory }}/*.sbom.xml

      - name: Add NuGet Source
        working-directory: .
        run: dotnet nuget add source --username "${{ github.repository_owner }}" --password ${{ secrets.repoToken }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: List NuGet sources
        working-directory: .
        run: dotnet nuget list source

      - name: List .nupkg files in directory
        working-directory: .
        run: Get-ChildItem -Path ${{ env.NuGetDirectoryWin }} -Filter *.nupkg

      - name: Push NuGet Package
        working-directory: .
        run: dotnet nuget push "${{ env.NuGetDirectoryWin }}\*.nupkg" --api-key ${{ secrets.repoToken }} --source "github" --skip-duplicate
        shell: pwsh

    
