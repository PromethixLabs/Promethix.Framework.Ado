name: adoscope-reusable-build

on:
  workflow_call:
    inputs:
      buildVersion:
        required: true
        type: string
      packageId:
        required: false
        type: string
        default: Promethix.Framework.Ado
      dotnetVersion:
        required: true
        type: string
      commitHash:
        required: false
        type: string
        description: 'Short SHA commit hash to checkout. If not provided, the latest commit will be used.'
      releaseTag:
        required: false
        type: string
        default: ''
        description: 'Optional release tag to record in release metadata.'
    secrets:
      repoToken:
        required: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  NuGetDirectory: ${{ github.workspace }}/nuget
  NuGetDirectoryWin: ${{ github.workspace }}\nuget
  SbomDirectory: ${{ github.workspace }}/sbom
  SbomDirectoryWin: ${{ github.workspace }}\sbom
  MetadataDirectory: ${{ github.workspace }}/metadata
  MetadataDirectoryWin: ${{ github.workspace }}\metadata

jobs:
  build:
    name: Build, Test and Package
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.commitHash || 'main' }}
        
      - name: Set BuildVersion
        run: |
          $buildVersion = '${{ inputs.buildVersion }}'
          echo "BuildVersion=$buildVersion" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnetVersion }}

      - name: Install CycloneDX SBOM Tool
        shell: pwsh
        run: dotnet tool install --global CycloneDX --version 5.*

      - name: Clear NuGet Cache
        run: dotnet nuget locals all --clear

      - name: Restore Dependencies
        working-directory: .
        run: dotnet restore --force-evaluate --no-cache

      - name: Build
        working-directory: .
        run: dotnet build --no-restore --configuration Release

      - name: Run Tests
        working-directory: ./Promethix.Framework.Ado.Tests
        run: dotnet test --no-restore --verbosity normal --filter TestCategory="IntegrationTestsOnCI|Unit"

      - name: Package
        working-directory: .
        run: dotnet pack --no-restore --configuration Release --output ${{ env.NuGetDirectoryWin }}

      - name: Generate Package Hashes
        working-directory: .
        shell: pwsh
        run: |
          $hashFile = Join-Path '${{ env.NuGetDirectoryWin }}' "Promethix.Framework.Ado.${{ inputs.buildVersion }}.sha256"
          if (Test-Path $hashFile) {
            Remove-Item -LiteralPath $hashFile -Force
          }

          Get-ChildItem -Path '${{ env.NuGetDirectoryWin }}' -Filter *.nupkg | ForEach-Object {
            $hash = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "{0} *{1}" -f $hash, $_.Name | Out-File -FilePath $hashFile -Encoding ascii -Append
          }

      - name: Generate SBOM
        working-directory: .
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path '${{ env.SbomDirectoryWin }}' | Out-Null
          & "$env:USERPROFILE\.dotnet\tools\dotnet-CycloneDX.exe" ".\Promethix.Framework.Ado.sln" `
            --output "${{ env.SbomDirectoryWin }}" `
            --filename "Promethix.Framework.Ado.${{ inputs.buildVersion }}.sbom.xml"

      - name: Generate Release Metadata
        working-directory: .
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path '${{ env.MetadataDirectoryWin }}' | Out-Null

          $packageId = '${{ inputs.packageId }}'
          $version = '${{ inputs.buildVersion }}'
          $slug = $packageId.ToLowerInvariant()
          $releaseType = if ($version.Contains('-')) { 'prerelease' } else { 'stable' }
          $nupkgName = "$packageId.$version.nupkg"
          $sha256Name = "$packageId.$version.sha256"
          $sbomName = "$packageId.$version.sbom.xml"
          $sha256Path = Join-Path '${{ env.NuGetDirectoryWin }}' $sha256Name
          $sha256Value = ((Get-Content -LiteralPath $sha256Path -TotalCount 1).Split(' ', 2)[0]).ToLowerInvariant()
          $commitSha = '${{ inputs.commitHash }}'
          if ([string]::IsNullOrWhiteSpace($commitSha)) {
            $commitSha = '${{ github.sha }}'
          }

          $tag = '${{ inputs.releaseTag }}'
          if ([string]::IsNullOrWhiteSpace($tag) -and $releaseType -eq 'stable') {
            $tag = $version
          }

          $nugetUrl = $null
          if ($releaseType -eq 'stable') {
            $nugetUrl = "https://www.nuget.org/packages/$packageId/$version"
          }

          $metadata = [ordered]@{
            schemaVersion = 1
            packageId = $packageId
            slug = $slug
            version = $version
            releaseType = $releaseType
            releasedAt = '${{ github.run_started_at }}'
            repoUrl = 'https://github.com/${{ github.repository }}'
            source = [ordered]@{
              provider = 'git'
              commitSha = $commitSha
              tag = if ([string]::IsNullOrWhiteSpace($tag)) { $null } else { $tag }
            }
            distribution = [ordered]@{
              nugetUrl = $nugetUrl
              githubPackagesUrl = "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
            }
            artifacts = [ordered]@{
              nupkg = [ordered]@{
                name = $nupkgName
              }
              sha256 = [ordered]@{
                name = $sha256Name
                value = $sha256Value
                algorithm = 'SHA256'
              }
              sbom = [ordered]@{
                name = $sbomName
                format = 'CycloneDX'
              }
              metadata = [ordered]@{
                name = "release-metadata.$version.json"
                format = 'PromethixTrustMetadata'
              }
            }
            provenance = [ordered]@{
              provider = 'github-actions'
              workflow = [ordered]@{
                repository = '${{ github.repository }}'
                runId = '${{ github.run_id }}'
                runNumber = '${{ github.run_number }}'
                runAttempt = '${{ github.run_attempt }}'
                runUrl = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
                ref = '${{ github.ref }}'
              }
              attestation = [ordered]@{
                provider = 'github-artifact-attestation'
                available = $true
                subjects = @($nupkgName, $sha256Name, $sbomName, "release-metadata.$version.json")
              }
            }
          }

          $metadataPath = Join-Path '${{ env.MetadataDirectoryWin }}' "release-metadata.$version.json"
          $metadata | ConvertTo-Json -Depth 10 | Out-File -LiteralPath $metadataPath -Encoding utf8

      - name: Upload Nuget Package Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Promethix.Framework.Ado.NuGet.${{ inputs.buildVersion }}
          if-no-files-found: error
          retention-days: 7
          path: ${{ env.NuGetDirectoryWin }}\*.nupkg

      - name: Upload Nuget Package Hashes
        uses: actions/upload-artifact@v6
        with:
          name: Promethix.Framework.Ado.NuGet.${{ inputs.buildVersion }}.sha256
          if-no-files-found: error
          retention-days: 7
          path: ${{ env.NuGetDirectoryWin }}\*.sha256

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Promethix.Framework.Ado.NuGet.${{ inputs.buildVersion }}.sbom
          if-no-files-found: error
          retention-days: 7
          path: ${{ env.SbomDirectoryWin }}\*.sbom.xml

      - name: Upload Release Metadata Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Promethix.Framework.Ado.NuGet.${{ inputs.buildVersion }}.metadata
          if-no-files-found: error
          retention-days: 30
          path: ${{ env.MetadataDirectoryWin }}\*.json

      - name: Attest Nuget Package Provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ env.NuGetDirectory }}/*.nupkg

      - name: Attest Nuget Package Hashes
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ env.NuGetDirectory }}/*.sha256

      - name: Attest SBOM
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ env.SbomDirectory }}/*.sbom.xml

      - name: Attest Release Metadata
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ env.MetadataDirectory }}/*.json

      - name: Add NuGet Source
        working-directory: .
        run: dotnet nuget add source --username "${{ github.repository_owner }}" --password ${{ secrets.repoToken }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: List NuGet sources
        working-directory: .
        run: dotnet nuget list source

      - name: List .nupkg files in directory
        working-directory: .
        run: Get-ChildItem -Path ${{ env.NuGetDirectoryWin }} -Filter *.nupkg

      - name: Push NuGet Package
        working-directory: .
        run: dotnet nuget push "${{ env.NuGetDirectoryWin }}\*.nupkg" --api-key ${{ secrets.repoToken }} --source "github" --skip-duplicate
        shell: pwsh

    
